<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songo'O - Jeu en Ligne</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c1d11;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #d4a373; margin-bottom: 5px; }
        .status-panel {
            margin: 15px 0;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #d4a373;
        }
        .board {
            background-color: #654321;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 4px solid #432818;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        /* Rangée Nord inversée visuellement pour le sens de rotation du Songo'O */
        .row.north { flex-direction: row; } 
        .row.south { flex-direction: row; }
        .pit {
            width: 70px;
            height: 70px;
            background-color: #3d2314;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #8338ec00;
            user-select: none;
        }
        .pit:hover {
            background-color: #58311e;
            transform: scale(1.05);
        }
        .pit.active-turn {
            border: 2px solid #d4a373;
            box-shadow: 0 0 10px #d4a373;
        }
        .pit.empty { color: #666; }
        .scores {
            display: flex;
            gap: 50px;
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .score-box {
            background: #432818;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #d4a373;
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #d4a373;
            color: #2c1d11;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #fefae0; }
        .error-message {
            color: #ff4d4d;
            margin-top: 10px;
            font-weight: bold;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <h1>Songo'O</h1>
    <div id="status" class="status-panel">Connexion au serveur...</div>

    <div class="board">
        <!-- Rangée du joueur NORD (indices affichés de 0 à 6 de gauche à droite) -->
        <div class="row north" id="north-row"></div>
        <!-- Rangée du joueur SUD (indices affichés de 0 à 6 de gauche à droite) -->
        <div class="row south" id="south-row"></div>
    </div>

    <div class="scores">
        <div class="score-box">Score Nord : <span id="score-north">0</span></div>
        <div class="score-box">Score Sud : <span id="score-south">0</span></div>
    </div>

    <div id="error-display" class="error-message"></div>

    <button onclick="resetGame()">Nouvelle Partie</button>

    <script>
        let gameState = null;

        // URL de base dynamique : s'adapte automatiquement à localhost ou à votre adresse Render !
        const API_URL = window.location.origin;

        // Fonction pour rafraîchir l'interface utilisateur
        function updateUI(state) {
            gameState = state;
            document.getElementById('error-display').innerText = ""; // Efface les anciennes erreurs

            // Gestion des textes de statut
            if (state.status === "playing") {
                document.getElementById('status').innerText = `Tour du joueur : ${state.currentPlayer.toUpperCase()}`;
            } else {
                if (state.winner === "draw") {
                    document.getElementById('status').innerText = "Match nul !";
                } else {
                    document.getElementById('status').innerText = `Victoire de ${state.winner.toUpperCase()} ! 🎉`;
                }
            }

            // Mise à jour des scores
            document.getElementById('score-north').innerText = state.scores.north;
            document.getElementById('score-south').innerText = state.scores.south;

            // Rendu de la rangée Nord (Joueur North)
            const northRow = document.getElementById('north-row');
            northRow.innerHTML = '';
            state.board.north.forEach((seeds, idx) => {
                const pit = document.createElement('div');
                pit.className = `pit ${seeds === 0 ? 'empty' : ''} ${state.currentPlayer === 'north' && state.status === 'playing' ? 'active-turn' : ''}`;
                pit.innerText = seeds;
                pit.onclick = () => sendMove('north', idx);
                northRow.appendChild(pit);
            });

            // Rendu de la rangée Sud (Joueur South)
            const southRow = document.getElementById('south-row');
            southRow.innerHTML = '';
            state.board.south.forEach((seeds, idx) => {
                const pit = document.createElement('div');
                pit.className = `pit ${seeds === 0 ? 'empty' : ''} ${state.currentPlayer === 'south' && state.status === 'playing' ? 'active-turn' : ''}`;
                pit.innerText = seeds;
                pit.onclick = () => sendMove('south', idx);
                southRow.appendChild(pit);
            });
        }

        // CHARGER L'ÉTAT DU JEU (Sans planter si déconnecté)
        function loadGame() {
            fetch(`${API_URL}/api/game/state`)
                .then(res => {
                    if (!res.ok) throw new Error("Erreur de récupération de l'état");
                    return res.json();
                })
                .then(state => updateUI(state))
                .catch(err => {
                    console.error(err);
                    document.getElementById('status').innerText = "⚠️ Serveur injoignable";
                    document.getElementById('error-display').innerText = "Impossible de se connecter au serveur de jeu.";
                });
        }

        // ENVOYER UN COUP AU SERVEUR
        function sendMove(player, pitIndex) {
            if (!gameState || gameState.status !== "playing") return;
            
            if (player !== gameState.currentPlayer) {
                document.getElementById('error-display').innerText = "Ce n'est pas votre tour de jouer !";
                return;
            }

            fetch(`${API_URL}/api/game/move`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player, pitIndex })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.error || "Coup invalide") });
                }
                return res.json();
            })
            .then(state => updateUI(state))
            .catch(err => {
                document.getElementById('error-display').innerText = err.message;
            });
        }

        // RÉINITIALISER LE JEU
        function resetGame() {
            fetch(`${API_URL}/api/game/reset`, { method: 'POST' })
                .then(res => res.json())
                .then(state => updateUI(state))
                .catch(err => {
                    document.getElementById('error-display').innerText = "Erreur lors de la réinitialisation.";
                });
        }

        // Chargement automatique au démarrage de la page
        window.onload = loadGame;
    </script>
</body>
</html>
